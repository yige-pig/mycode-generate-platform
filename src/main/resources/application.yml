spring:
  profiles:
    active: local
  application:
    name: mycode-generate-platform-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/code_generate_platform
    username: root
    password: lly061
  data:
    redis:
      host: localhost
      port: 6379
      ttl: 3600
  session:
    store-type: redis
    #session 1小时过期
    timeout: 3600
server:
  port: 8123
  servlet:
    context-path: /api
    #cookie 1小时过期
    session:
      cookie:
        max-age: 3600
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.yige.mycodegenerateplatform.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn


